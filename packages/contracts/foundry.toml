[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [
  { access = "read-write", path = "../../deployments" },
  { access = "read",       path = "./" }
]

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
arc_testnet = "${ARC_RPC_URL}"

[etherscan]
# Arc has its own explorer; etherscan-style verification config goes here when available.
